<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حكم الإمام علي</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: #1c1c1e; /* خلفية داكنة مثل iOS */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            direction: rtl;
        }

        .container {
            width: 90%;
            max-width: 500px;
            text-align: center;
            position: relative;
        }

        /* بطاقة الإشعار - تشبه إشعارات iOS */
        .notification-card {
            background: rgba(255, 255, 255, 0.15); /* شفافية زجاجية */
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 30px 25px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: opacity 0.6s ease, transform 0.6s ease;
            opacity: 1;
            transform: translateY(0);
        }

        /* أيقونة صغيرة أعلى البطاقة */
        .icon {
            width: 60px;
            height: 60px;
            background: #f5a623; /* لون ذهبي */
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 15px auto;
            font-size: 30px;
            font-weight: bold;
            color: #fff;
            box-shadow: 0 4px 10px rgba(245, 166, 35, 0.4);
        }

        .icon span {
            font-size: 28px;
        }

        /* النص الرئيسي للقول */
        .quote-text {
            font-size: 1.2rem;
            line-height: 1.8;
            color: #ffffff;
            font-weight: 400;
            margin: 20px 0;
            min-height: 80px;
            word-wrap: break-word;
        }

        /* معلومات إضافية (اختيارية) */
        .meta {
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.6);
            margin-top: 10px;
        }

        /* أزرار التحكم */
        .controls {
            margin-top: 25px;
            display: flex;
            justify-content: center;
            gap: 15px;
        }

        .btn {
            background: rgba(255, 255, 255, 0.2);
            border: none;
            color: #fff;
            padding: 10px 25px;
            border-radius: 30px;
            font-size: 0.9rem;
            cursor: pointer;
            backdrop-filter: blur(5px);
            transition: background 0.3s;
        }

        .btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .btn:active {
            transform: scale(0.95);
        }

        /* حالة عدم وجود أقوال */
        .empty-state {
            color: rgba(255, 255, 255, 0.5);
            font-size: 1.1rem;
        }

        /* تأثير الاختفاء */
        .hidden {
            opacity: 0;
            transform: translateY(10px);
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="notification-card" id="quoteCard">
            <div class="icon">
                <span>🕊</span>
            </div>
            <div class="quote-text" id="quoteText">
                جارٍ تحميل الأقوال...
            </div>
            <div class="meta" id="quoteMeta">عدد الكلمات: 0</div>
        </div>

        <div class="controls">
            <button class="btn" id="playPauseBtn">⏸ إيقاف مؤقت</button>
            <button class="btn" id="nextBtn">التالي ←</button>
        </div>
    </div>

    <!-- استيراد ملف الأقوال الخارجي (مثال: quotes.js) -->
    <script src="quotes.js"></script>

    <script>
        if (typeof quotes === 'undefined' || !Array.isArray(quotes) || quotes.length === 0) {
            document.getElementById('quoteText').textContent = 'لم يتم العثور على أقوال. تأكد من وجود ملف quotes.js';
            document.getElementById('quoteMeta').textContent = '';
        } else {
            // عناصر DOM
            const quoteText = document.getElementById('quoteText');
            const quoteMeta = document.getElementById('quoteMeta');
            const card = document.getElementById('quoteCard');
            const playPauseBtn = document.getElementById('playPauseBtn');
            const nextBtn = document.getElementById('nextBtn');

            let currentIndex = 0;
            let intervalId = null;
            let isPlaying = true;

            function getDuration(quote) {
                const words = quote.trim().split(/\s+/).filter(w => w.length > 0);
                return words.length * 1000;
            }

            function showQuote(index) {
                card.classList.add('hidden');
                setTimeout(() => {
                    const quote = quotes[index];
                    quoteText.textContent = quote;
                    const wordCount = quote.trim().split(/\s+/).filter(w => w.length > 0).length;
                    quoteMeta.textContent = `عدد الكلمات: ${wordCount} | المدة: ${wordCount} ثانية`;
                    card.classList.remove('hidden');
                }, 300); 
            }

            function nextQuote() {
                currentIndex = (currentIndex + 1) % quotes.length;
                showQuote(currentIndex);
                if (isPlaying) {
                    clearInterval(intervalId);
                    startTimer();
                }
            }

            function startTimer() {
                const duration = getDuration(quotes[currentIndex]);
                intervalId = setInterval(() => {
                    currentIndex = (currentIndex + 1) % quotes.length;
                    showQuote(currentIndex);
                    clearInterval(intervalId);
                    startTimer();
                }, duration);
            }

            function pauseTimer() {
                clearInterval(intervalId);
                intervalId = null;
                isPlaying = false;
                playPauseBtn.textContent = '▶ تشغيل';
            }

            function resumeTimer() {
                if (!isPlaying) {
                    isPlaying = true;
                    playPauseBtn.textContent = '⏸ إيقاف مؤقت';
                    startTimer();
                }
            }

            playPauseBtn.addEventListener('click', () => {
                if (isPlaying) {
                    pauseTimer();
                } else {
                    resumeTimer();
                }
            });

            nextBtn.addEventListener('click', () => {
                if (isPlaying) {
                    clearInterval(intervalId);
                }
                nextQuote();
                if (isPlaying) {
                    startTimer();
                }
            });

            showQuote(0);
            startTimer();
        }
    </script>
</body>
</html>
