<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أقوال وحكم الإمام علي (ع)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { 'arabic': ['Tajawal', 'sans-serif'] },
                    colors: { 'glass': 'rgba(255, 255, 255, 0.12)', 'glass-border': 'rgba(255, 255, 255, 0.2)' }
                }
            }
        }
    </script>
    <style>
        * { font-family: 'Tajawal', sans-serif; }
        body { background: linear-gradient(135deg, #0f0c29, #302b63, #24243e); min-height: 100vh; }
        .glass { background: rgba(255, 255, 255, 0.12); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 20px; box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.2); }
        .card-hover { transition: all 0.3s ease; }
        .card-hover:hover { transform: translateY(-6px); box-shadow: 0 16px 48px 0 rgba(31, 38, 135, 0.3); }
        .nav-active { background: rgba(255, 255, 255, 0.2); border-bottom: 3px solid #a78bfa; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: rgba(255,255,255,0.05); }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 3px; }
    </style>
</head>
<body class="text-white">
    <div class="container mx-auto px-4 py-6 max-w-6xl">
        <header class="glass p-6 mb-6 text-center">
            <h1 class="text-3xl md:text-4xl font-extrabold mb-1">أقوال وحكم الإمام علي (ع)</h1>
            <p class="text-gray-300 text-lg">نهج البلاغة - حكم وأقوال خالدة</p>
        </header>

        <nav class="glass p-3 mb-6 flex flex-wrap justify-center gap-2 md:gap-3">
            <button class="nav-btn px-5 py-2.5 rounded-xl transition-all duration-300 hover:bg-white/15 flex items-center gap-2" data-section="poetry">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5h12M9 3v2m0 4v2m0 4v2m0 4v2M5 3h14a1 1 0 011 1v14a1 1 0 01-1 1H5a1 1 0 01-1-1V4a1 1 0 011-1z"/></svg>
                الشعر
            </button>
            <button class="nav-btn px-5 py-2.5 rounded-xl transition-all duration-300 hover:bg-white/15 flex items-center gap-2" data-section="quotes">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 8h10M7 12h4m1 8l-4-4H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-3l-4 4z"/></svg>
                الاقتباسات
            </button>
            <button class="nav-btn px-5 py-2.5 rounded-xl transition-all duration-300 hover:bg-white/15 flex items-center gap-2" data-section="bio">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
                النبذات
            </button>
            <button class="nav-btn px-5 py-2.5 rounded-xl transition-all duration-300 hover:bg-white/15 flex items-center gap-2" data-section="wisdom">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"/></svg>
                الأقوال والحكم
            </button>
        </nav>

        <main id="content-area" class="glass p-6 md:p-8 min-h-[400px]">
            <div class="text-center py-16">
                <svg class="w-16 h-16 mx-auto text-purple-300 animate-pulse" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 6v6m0 0v6m0-6h6m-6 0H6"/></svg>
                <p class="mt-4 text-gray-400 text-lg">اختر قسماً من الأعلى</p>
            </div>
        </main>

        <footer class="glass p-5 mt-6 text-center">
            <div class="flex justify-center gap-6 mb-3">
                <a href="https://instagram.com/ne_7u" target="_blank" class="hover:text-pink-400 transition-colors">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M16 4H8a4 4 0 00-4 4v8a4 4 0 004 4h8a4 4 0 004-4V8a4 4 0 00-4-4z"/><circle cx="12" cy="12" r="3"/><path d="M17.5 6.5h.01"/></svg>
                </a>
                <a href="https://t.me/WWGTR" target="_blank" class="hover:text-blue-400 transition-colors">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 2C6.477 2 2 6.477 2 12s4.477 10 10 10 10-4.477 10-10S17.523 2 12 2z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M8 12l3 3 5-5"/></svg>
                </a>
            </div>
            <p class="text-gray-400 text-sm">حقوق الطبع والنشر © 2026 باسم Saif Ali</p>
        </footer>
    </div>
    <script src="wisdom.js"></script>
    <script src="quotes.js"></script>
    <script src="poetry.js"></script>
    <script src="bio.js"></script>
    <script src="script.js"></script>
</body>
</html>
