<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>واجهة iOS - الأقوال</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="iphone">
        <!-- شريط الحالة (Status Bar) -->
        <div class="status-bar">
            <div class="status-left">
                <span class="time">9:41</span>
            </div>
            <div class="status-right">
                <span class="battery">🔋</span>
                <span class="wifi">📶</span>
                <span class="signal">📡</span>
            </div>
        </div>

        <!-- شاشة التطبيقات (Home Screen) -->
        <div class="home-screen" id="homeScreen">
            <div class="app-grid">
                <div class="app" onclick="showQuotes()">
                    <div class="app-icon quotes-icon">💬</div>
                    <span class="app-name">الأقوال</span>
                </div>
                <div class="app" onclick="showQuotes()">
                    <div class="app-icon quotes-icon">📜</div>
                    <span class="app-name">حكم</span>
                </div>
                <div class="app" onclick="showQuotes()">
                    <div class="app-icon quotes-icon">✨</div>
                    <span class="app-name">مواعظ</span>
                </div>
                <div class="app" onclick="showQuotes()">
                    <div class="app-icon quotes-icon">📖</div>
                    <span class="app-name">اقتباسات</span>
                </div>
                <div class="app" onclick="showQuotes()">
                    <div class="app-icon quotes-icon">🌙</div>
                    <span class="app-name">حكمة</span>
                </div>
                <div class="app" onclick="showQuotes()">
                    <div class="app-icon quotes-icon">💡</div>
                    <span class="app-name">نور</span>
                </div>
            </div>
            <!-- شريط الإرساء (Dock) -->
            <div class="dock">
                <div class="app" onclick="showQuotes()">
                    <div class="app-icon dock-icon">📱</div>
                    <span class="app-name">الأقوال</span>
                </div>
                <div class="app" onclick="showQuotes()">
                    <div class="app-icon dock-icon">📞</div>
                    <span class="app-name">هاتف</span>
                </div>
                <div class="app" onclick="showQuotes()">
                    <div class="app-icon dock-icon">🌐</div>
                    <span class="app-name">سفاري</span>
                </div>
                <div class="app" onclick="showQuotes()">
                    <div class="app-icon dock-icon">🎵</div>
                    <span class="app-name">موسيقى</span>
                </div>
            </div>
        </div>

        <!-- شاشة عرض الأقوال (Quotes Screen) -->
        <div class="quotes-screen" id="quotesScreen" style="display: none;">
            <div class="quotes-header">
                <button class="back-button" onclick="goHome()">← رجوع</button>
                <h2>الأقوال المأثورة</h2>
            </div>
            <div class="quotes-container" id="quotesContainer">
                <!-- سيتم عرض الأقوال هنا -->
            </div>
        </div>
    </div>

    <script src="quotes.js"></script>
    <script src="script.js"></script>
</body>
</html>
